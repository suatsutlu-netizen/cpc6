<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Paie">
<meta name="apple-mobile-web-app-title" content="Paie">
<meta name="theme-color" content="#1a56db">
<meta name="msapplication-TileColor" content="#1a56db">
<meta name="msapplication-TileImage" content="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<title>Controle Paie</title>
<style>
/* ================================================================
   VARIABLES & RESET
   ================================================================ */
:root {
  --bg: #ffffff;
  --bg2: #f7f8fa;
  --bg3: #eef0f4;
  --border: #e2e5eb;
  --border2: #cdd1da;
  --text: #1a1d23;
  --text2: #4a5060;
  --text3: #8a90a0;
  --accent: #1a56db;
  --accent-light: #e8effe;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --orange: #ea580c;
  --orange-bg: #ffedd5;
  --yellow: #ca8a04;
  --yellow-bg: #fef9c3;
  --blue-bg: #dbeafe;
  --blue: #2563eb;

  /* Couleurs alternées des semaines */
  --week-a: #f0f4ff;
  --week-b: #f0fdf4;
  --sunday: #ffffff;
  --holiday-border: #f59e0b;

  /* Quick click boutons */
  --btn-shift1: #bbf7d0;  /* 2h-8h vert clair */
  --btn-shift2: #bfdbfe;  /* 8h-16h bleu clair */
  --btn-shift3: #fed7aa;  /* 15h-23h orange clair */
  --btn-shift4: #fef08a;  /* 20h-4h jaune */
  --btn-manual: #ffffff;  /* Manuel blanc */
  --btn-rest:   #fecaca;  /* Repos rouge */

  --btn-shift1-active: #16a34a;
  --btn-shift2-active: #2563eb;
  --btn-shift3-active: #ea580c;
  --btn-shift4-active: #ca8a04;
  --btn-manual-active: #374151;
  --btn-rest-active:   #dc2626;

  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.12);
  --font: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'DM Mono', monospace;
  --nav-h: 56px;
  --header-h: 52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  font-size: 14px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ================================================================
   LAYOUT
   ================================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
}

/* Navigation bas */
#nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--nav-h);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text3);
  font-family: var(--font);
  font-size: 10px;
  font-weight: 500;
  transition: color .15s;
  padding: 4px 0 8px;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-icon {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}

/* Pages */
.page {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding-bottom: calc(var(--nav-h) + 8px);
  -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }

/* Header date */
.date-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  gap: 8px;
}
.date-nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: background .15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.date-nav-btn:active { background: var(--bg3); }
.date-label {
  flex: 1;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  padding: 6px 0;
  border-radius: var(--radius-sm);
  transition: background .15s;
}
.date-label:active { background: var(--bg3); }

/* ================================================================
   PAGE 1 — CALENDRIER
   ================================================================ */
#page1-content { padding: 8px 0 0; }

.day-row {
  border-bottom: 1px solid var(--border);
  padding: 6px 8px;
  transition: background .1s;
}
.day-row.week-a { background: var(--week-a); }
.day-row.week-b { background: var(--week-b); }
.day-row.sunday { background: var(--sunday) !important; }
.day-row.holiday {
  outline: 2px solid var(--holiday-border);
  outline-offset: -2px;
  border-radius: 4px;
}

/* Ligne 1 : date + boutons quick */
.day-top {
  display: flex;
  align-items: center;
  gap: 6px;
}
.day-label {
  width: 44px;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1.2;
}
.day-label .day-num {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  display: block;
}
.day-label .day-name {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text3);
}
.day-row.holiday .day-label .day-name {
  color: var(--holiday-border);
  font-weight: 700;
}

/* Quick click buttons */
.quick-btns {
  display: flex;
  gap: 4px;
  flex: 1;
  flex-wrap: wrap;
}
.qbtn {
  height: 28px;
  padding: 0 7px;
  border-radius: 14px;
  border: 1.5px solid transparent;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.qbtn:active { transform: scale(.95); }

.qbtn.s1 { background: var(--btn-shift1); color: #15532e; border-color: #86efac; }
.qbtn.s2 { background: var(--btn-shift2); color: #1e3a8a; border-color: #93c5fd; }
.qbtn.s3 { background: var(--btn-shift3); color: #7c2d12; border-color: #fdba74; }
.qbtn.s4 { background: var(--btn-shift4); color: #713f12; border-color: #fde047; }
.qbtn.sm { background: var(--btn-manual); color: var(--text); border-color: var(--border2); }
.qbtn.sr { background: var(--btn-rest);   color: #7f1d1d; border-color: #fca5a5; }

.qbtn.s1.active { background: var(--btn-shift1-active); color: #fff; border-color: var(--btn-shift1-active); }
.qbtn.s2.active { background: var(--btn-shift2-active); color: #fff; border-color: var(--btn-shift2-active); }
.qbtn.s3.active { background: var(--btn-shift3-active); color: #fff; border-color: var(--btn-shift3-active); }
.qbtn.s4.active { background: var(--btn-shift4-active); color: #fff; border-color: var(--btn-shift4-active); }
.qbtn.sm.active { background: var(--btn-manual-active); color: #fff; border-color: var(--btn-manual-active); }
.qbtn.sr.active { background: var(--btn-rest-active);   color: #fff; border-color: var(--btn-rest-active); }

/* Bouton primes */
.prime-btn-row {
  margin-top: 4px;
}
.prime-add-btn {
  width: 100%;
  height: 26px;
  border-radius: var(--radius-sm);
  border: 1.5px dashed var(--border2);
  background: transparent;
  font-family: var(--font);
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.prime-add-btn:active,
.prime-add-btn.has-primes {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

/* Affichage gains du jour */
.day-gains {
  margin-top: 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
.gain-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--green-bg);
  color: var(--green);
}
.gain-chip.net {
  background: var(--blue-bg);
  color: var(--blue);
}

/* Total bas de page 1 */
.page1-total {
  margin: 12px 8px 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.page1-total-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text3);
  margin-bottom: 8px;
}
.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 13px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.total-row:last-child { border-bottom: none; }
.total-row .lbl { color: var(--text2); }
.total-row .val { font-weight: 600; color: var(--text); }
.total-row.highlight .val { color: var(--accent); font-size: 15px; }
.report-note {
  margin-top: 8px;
  font-size: 10px;
  color: var(--text3);
  text-align: center;
  font-style: italic;
}

/* ================================================================
   PAGE 2 — RÉCAPITULATIF
   ================================================================ */
#page2-content { padding: 8px 8px 0; }

.section-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text3);
  padding: 8px 12px 6px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

/* Compteurs */
.counters-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
}
.counter-cell {
  background: var(--bg);
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.counter-cell .c-label {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
}
.counter-cell .c-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--font-mono);
}
.counter-cell .c-unit {
  font-size: 10px;
  color: var(--text3);
}

/* Lignes salaire */
.salary-line {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.salary-line:last-child { border-bottom: none; }
.salary-line .s-label {
  flex: 1;
  font-size: 13px;
  color: var(--text2);
}
.salary-line .s-label small {
  display: block;
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}
.salary-amounts {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}
.salary-amounts .brut {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-family: var(--font-mono);
}
.salary-amounts .net {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
}
.edit-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text3);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.edit-btn:active { background: var(--bg3); }
.delete-btn {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: none;
  background: var(--red-bg);
  color: var(--red);
  font-size: 14px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}

/* Ajouter prime fixe */
.add-fixed-prime-row {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
}
.add-fixed-input-row {
  display: flex;
  gap: 6px;
}
.add-fixed-input-row input {
  flex: 1;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 10px;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
}
.add-fixed-input-row input:focus {
  outline: none;
  border-color: var(--accent);
}
.add-fixed-input-row button {
  height: 34px;
  padding: 0 12px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

/* Cotisations */
.cotis-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.cotis-row:last-child { border-bottom: none; }
.cotis-row .c-lbl { color: var(--text2); flex: 1; }
.cotis-row .c-base { color: var(--text3); font-size: 11px; width: 70px; text-align: right; font-family: var(--font-mono); }
.cotis-row .c-taux { color: var(--text3); font-size: 11px; width: 52px; text-align: right; font-family: var(--font-mono); }
.cotis-row .c-amt { font-weight: 600; width: 60px; text-align: right; font-family: var(--font-mono); color: var(--red); }
.cotis-row .c-amt.pat { color: var(--text3); }
.cotis-row .c-amt.exo { color: var(--green); }

.cotis-header {
  display: flex;
  justify-content: space-between;
  padding: 4px 12px;
  background: var(--bg2);
  font-size: 10px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}

/* Résultat final */
.result-card {
  background: var(--accent);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  color: white;
}
.result-card .r-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  opacity: .75;
  margin-bottom: 4px;
}
.result-card .r-brut {
  font-size: 14px;
  opacity: .85;
  font-family: var(--font-mono);
  margin-bottom: 6px;
}
.result-card .r-net {
  font-size: 28px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -1px;
}
.result-card .r-note {
  font-size: 10px;
  opacity: .6;
  margin-top: 4px;
}

/* ================================================================
   MODALS
   ================================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal-sheet {
  width: 100%;
  max-width: 480px;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  padding: 0 0 env(safe-area-inset-bottom);
  max-height: 90dvh;
  overflow-y: auto;
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 10px auto 0;
}
.modal-header {
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--bg2);
  font-size: 18px;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 12px 16px; }

/* Pavé numérique */
.time-inputs {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  justify-content: center;
}
.time-input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.time-input-group label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
}
.time-input-group input[type="time"] {
  width: 120px;
  height: 48px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  background: var(--bg2);
  -webkit-appearance: none;
}
.time-input-group input[type="time"]:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--accent-light);
}
.time-sep {
  font-size: 28px;
  font-weight: 700;
  color: var(--text3);
  margin-top: 18px;
}

.modal-confirm-btn {
  width: 100%;
  height: 48px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
}

/* Modal primes */
.prime-list { display: flex; flex-direction: column; gap: 2px; }
.prime-item {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  cursor: pointer;
  gap: 10px;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.prime-item.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}
.prime-item .pi-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.prime-item.selected .pi-check {
  background: var(--accent);
  border-color: var(--accent);
}
.prime-item.selected .pi-check::after {
  content: '';
  width: 8px; height: 5px;
  border-left: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}
.prime-item .pi-info { flex: 1; }
.prime-item .pi-name { font-size: 13px; font-weight: 600; color: var(--text); }
.prime-item .pi-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
.prime-item .pi-amount { font-size: 13px; font-weight: 700; color: var(--green); font-family: var(--font-mono); }

/* Qty input dans modale primes */
.prime-qty-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}
.prime-qty-row label { font-size: 11px; color: var(--text3); }
.prime-qty-row input {
  width: 56px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  background: var(--bg2);
}

/* Modal mois picker */
.month-picker-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.month-picker-btn {
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg2);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.month-picker-btn.current {
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 700;
}
.year-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}
.year-nav {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-size: 18px;
}
.year-display {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  min-width: 60px;
  text-align: center;
}

/* Modal édition salaire */
.edit-amount-input {
  width: 100%;
  height: 52px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 0 14px;
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  background: var(--bg2);
  text-align: center;
  margin-bottom: 12px;
}
.edit-amount-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--accent-light);
}

/* ================================================================
   UTILITAIRES
   ================================================================ */
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.mt-2 { margin-top: 8px; }
.px-3 { padding-left: 12px; padding-right: 12px; }
.py-2 { padding-top: 8px; padding-bottom: 8px; }
.text-sm { font-size: 12px; }
.text-xs { font-size: 10px; }
.font-bold { font-weight: 700; }
.text-muted { color: var(--text3); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-accent { color: var(--accent); }
.divider { height: 1px; background: var(--border); margin: 4px 0; }
.badge-info {
  display: inline-flex; align-items: center;
  background: var(--yellow-bg);
  color: var(--yellow);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 8px;
}

/* Affichage horaire saisi manuellement */
.manual-shift-display {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 4px;
  padding: 3px 10px 3px 8px;
  background: var(--bg);
  border: 1.5px solid var(--btn-manual-active);
  border-radius: 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--btn-manual-active);
  cursor: pointer;
}
.manual-shift-display svg { flex-shrink:0; }
.msd-duration { font-size:10px; font-weight:500; color:var(--text3); margin-left:2px; }

/* ================================================================
   PAGE 3 — REFERENTIEL
   ================================================================ */
.ref-category {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  padding: 10px 12px 6px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  border-top: 2px solid var(--border2);
  margin-top: 4px;
}
.ref-row {
  display: flex;
  align-items: flex-start;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  background: var(--bg);
}
.ref-row:last-child { border-bottom: none; }
.ref-auto-badge {
  flex-shrink: 0;
  margin-top: 2px;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.ref-auto-badge.auto { background: var(--green-bg); color: var(--green); }
.ref-auto-badge.manual { background: var(--blue-bg); color: var(--blue); }
.ref-info { flex: 1; }
.ref-name { font-size: 13px; font-weight: 600; color: var(--text); }
.ref-cond { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
.ref-amount {
  flex-shrink: 0;
  text-align: right;
}
.ref-amount .ra-val {
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text);
}
.ref-amount .ra-type {
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}
.ref-amount .ra-type.net { color: var(--green); font-weight: 600; }
.ref-amount .ra-type.brut { color: var(--orange); font-weight: 600; }

/* ================================================================
   PAGE 4 — HISTORIQUE
   ================================================================ */
.p4-year-selector {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.p4-year-nav {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-size: 20px;
  font-weight: 300;
}
.p4-year-display {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  min-width: 64px;
  text-align: center;
}

/* Tableau annuel */
.annual-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.annual-table th {
  background: var(--bg2);
  padding: 6px 8px;
  text-align: right;
  font-weight: 600;
  color: var(--text3);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .4px;
  border-bottom: 1px solid var(--border);
}
.annual-table th:first-child { text-align: left; }
.annual-table td {
  padding: 8px 8px;
  border-bottom: 1px solid var(--border);
  text-align: right;
  font-family: var(--font-mono);
  color: var(--text2);
}
.annual-table td:first-child {
  text-align: left;
  font-family: var(--font);
  font-weight: 600;
  color: var(--text);
}
.annual-table tr:last-child td { border-bottom: none; }
.annual-table .delta-pos { color: var(--green); font-weight: 700; }
.annual-table .delta-neg { color: var(--red); font-weight: 700; }
.annual-table .delta-zero { color: var(--text3); }
.annual-table tr.current-month td { background: var(--accent-light); }

/* Ligne saisie salaire percu */
.percu-input-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.percu-input-row input {
  width: 100px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  text-align: right;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  background: var(--bg);
  padding: 0 6px;
}
.percu-input-row input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--accent-light);
}
.percu-save-btn {
  height: 28px;
  padding: 0 8px;
  border-radius: 4px;
  border: none;
  background: var(--green);
  color: white;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

/* Totaux annuels */
.annual-totals {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--bg2);
  border-top: 2px solid var(--border);
  flex-wrap: wrap;
}
.annual-total-cell {
  flex: 1;
  min-width: 100px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
}
.annual-total-cell .atc-label {
  font-size: 10px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 3px;
}
.annual-total-cell .atc-val {
  font-size: 15px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text);
}
.annual-total-cell.negative .atc-val { color: var(--red); }
.annual-total-cell.positive .atc-val { color: var(--green); }

/* Export button */
.export-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: calc(100% - 24px);
  margin: 10px 12px;
  height: 44px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  justify-content: center;
}
.export-btn:active { opacity: .85; }

</style>
</head>

  { id:'RAVITAILLEMENT',    name:'Prime de ravitaillement',       desc:'Site Loire sur Rhone uniquement',   amount:'15,00 €',  isNet:false, hasQty:true,  qtyLabel:'Nb JS' },
  { id:'COOPTATION',        name:'Prime de cooptation',           desc:'Apres reussite periode essai',      amount:'200,00 €', isNet:false, hasQty:true,  qtyLabel:'Nb cooptations' },
];

// ── Utilitaires ──────────────────────────────────────────────────
const r2 = n => Math.round(n * 100) / 100;
const fmt = n => n.toFixed(2).replace('.', ',') + ' \u20ac';
const fmtN = n => {
  const s = n.toFixed(2).replace('.', ',');
  return n >= 0 ? s + ' \u20ac' : s + ' \u20ac';
};

function timeToMin(str) {
  const [h,m] = str.split(':').map(Number);
  return h*60+m;
}
function overlap(a,b,c,d) { return Math.max(0, Math.min(b,d) - Math.max(a,c)); }

function getPrevMonth(ym) {
  const [y,m] = ym.split('-').map(Number);
  return m===1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
}
function getNextMonth(ym) {
  const [y,m] = ym.split('-').map(Number);
  return m===12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`;
}
function toISO(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function getFeries(year) {
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m2=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m2+114)/31),dy=((h+l-7*m2+114)%31)+1;
  const paq=new Date(year,mo-1,dy);
  const d2=d=>{ const dd=new Date(d); return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`; };
  return [
    `${year}-01-01`,
    d2(new Date(year,mo-1,dy+1)),
    `${year}-05-01`, `${year}-05-08`,
    d2(new Date(year,mo-1,dy+39)),
    d2(new Date(year,mo-1,dy+50)),
    `${year}-07-14`, `${year}-08-15`,
    `${year}-11-01`, `${year}-11-11`, `${year}-12-25`,
  ];
}

function analyzeShift(start, end, date, holidays) {
  let sMin = timeToMin(start), eMin = timeToMin(end);
  if (eMin <= sMin) eMin += 1440;

  // Heures de nuit 22h-7h
  let nightMin = overlap(sMin, eMin, PLAGES.NUIT_MAJ_START, PLAGES.NUIT_MAJ_END);
  if (sMin < 420) nightMin += overlap(sMin, eMin, 0, 420);

  // Panier nuit 22h-6h ≥ 150 min
  let basketNightMin = overlap(sMin, eMin, PLAGES.NUIT_MAJ_START, PLAGES.PANIER_NUIT_END);
  if (sMin < 360) basketNightMin += overlap(sMin, eMin, 0, 360);
  const hasNightBasket = basketNightMin >= PLAGES.PANIER_NUIT_MIN;

  // Paniers repas
  const mealLunch  = sMin <= PLAGES.REPAS_MIDI_START && eMin >= PLAGES.REPAS_MIDI_END;
  const mealDinner = sMin <= PLAGES.REPAS_SOIR_START && eMin >= PLAGES.REPAS_SOIR_END;
  const mealCount  = (mealLunch?1:0) + (mealDinner?1:0);

  const isSunday  = date.getDay() === 0;
  const dateKey   = toISO(date);
  const isHoliday = holidays.includes(dateKey);
  const isMayFirst= dateKey.slice(5) === '05-01';
  const totalMin  = eMin - sMin;

  return { nightMin, hasNightBasket, mealCount, isSunday, isHoliday, isMayFirst,
           totalMin, dateKey };
}

function computeShiftGross(analysis, hourlyRate) {
  const nightGross   = r2((analysis.nightMin/60) * hourlyRate * 0.30);
  const sundayGross  = analysis.isSunday ? r2((analysis.totalMin/60) * hourlyRate * 0.50) : 0;
  let   holidayGross = 0;
  if (analysis.isHoliday) {
    holidayGross = analysis.isMayFirst
      ? r2((analysis.totalMin/60) * hourlyRate * 1.00)
      : r2((analysis.totalMin/60) * 4.00);
  }
  const nightBasketNet = analysis.hasNightBasket ? PRIMES_REF.PANIER_NUIT : 0;
  const mealBasketNet  = analysis.mealCount * PRIMES_REF.PANIER_REPAS;
  return {
    nightGross, sundayGross, holidayGross,
    nightBasketNet, mealBasketNet,
    grossTotal: r2(nightGross + sundayGross + holidayGross),
    netTotal:   r2(nightBasketNet + mealBasketNet),
  };
}

function computeManualPrimesAmount(manualPrimes) {
  let gross=0, net=0;
  for (const p of (manualPrimes||[])) {
    switch(p.id) {
      case 'RHR1': net   += PRIMES_REF.RHR1 * p.qty; break;
      case 'RHR2': net   += PRIMES_REF.RHR2 * p.qty; break;
      case 'RHR3': net   += PRIMES_REF.RHR3 * p.qty; break;
      case 'DOUBLE_RHR':        gross += PRIMES_REF.DOUBLE_RHR * p.qty; break;
      case 'MTP':               gross += PRIMES_REF.MTP * p.qty; break;
      case 'SUPPRESSION_REPOS': gross += PRIMES_REF.SUPPRESSION_REPOS * p.qty; break;
      case 'TUTORAT':           gross += PRIMES_REF.TUTORAT * p.qty; break;
      case 'MONITORAT':         gross += PRIMES_REF.MONITORAT_H * p.qty + PRIMES_REF.MONITORAT_QUALITE; break;
      case 'FORMATEUR':         gross += PRIMES_REF.FORMATEUR * p.qty; break;
      case 'VTE':               gross += PRIMES_REF.VTE_MENSUEL + PRIMES_REF.VTE_UNITAIRE * Math.min(p.qty, PRIMES_REF.VTE_MAX); break;
      case 'SABLIERE':          gross += PRIMES_REF.SABLIERE * p.qty; break;
      case 'RAVITAILLEMENT':    gross += PRIMES_REF.RAVITAILLEMENT * p.qty; break;
      case 'COOPTATION':        gross += PRIMES_REF.COOPTATION_SALAIRE * p.qty; break;
    }
  }
  return { gross: r2(gross), net: r2(net) };
}

function computePayslip(baseSalary, fixedPrimes, vars) {
  const baseGross   = r2(baseSalary);
  const fixedGross  = r2((fixedPrimes||[]).reduce((s,p)=>s+p.amount,0));
  const varGross    = vars ? r2(vars.grossVariables) : 0;
  const brutGlobal  = r2(baseGross + fixedGross + varGross);
  const csgBase     = r2(brutGlobal * CSG_RATIO);

  function base(type, prevPat=0, mutPat=0) {
    if (type==='BRUT') return brutGlobal;
    if (type==='MUT')  return MUTUELLE_BASE;
    if (type==='CSG')  return csgBase;
    if (type==='CB')   return r2(prevPat + mutPat);
    if (type==='FIXE') return 0;
    return 0;
  }

  const cotSal = COT_SAL.map(c => ({
    ...c, base: base(c.baseType),
    montant: r2(base(c.baseType) * c.taux)
  }));
  const totalSal = r2(cotSal.reduce((s,c)=>s+c.montant, 0));

  // Patronales (2 passes pour contrib_b)
  let prevPatMt=0, mutPatMt=0;
  const cotPat = [];
  for (const c of COT_PAT) {
    if (c.id==='contrib_b') continue;
    const b = base(c.baseType);
    const mt = c.baseType==='FIXE' ? c.montant : r2(b * c.taux);
    cotPat.push({...c, base:b, montant:mt});
    if (c.id==='prevoyance_pat') prevPatMt = mt;
    if (c.id==='mutuelle_pat')   mutPatMt  = mt;
  }
  const cbBase = r2(prevPatMt + mutPatMt);
  const cbCot  = COT_PAT.find(c=>c.id==='contrib_b');
  cotPat.push({...cbCot, base:cbBase, montant:r2(cbBase * cbCot.taux)});
  const exoCot = COT_PAT.find(c=>c.id==='exoneration');
  cotPat.push({...exoCot, base:null, montant:exoCot.montant});
  const totalPat = r2(cotPat.reduce((s,c)=>s+c.montant,0));

  const netNonSoumis = vars ? r2(vars.netNonSoumis) : 0;
  const netBase      = r2(brutGlobal - totalSal);
  const netFinal     = r2(netBase + netNonSoumis);

  // Taux de prélèvement salarial sur le brut global
  const tauxSal = brutGlobal > 0 ? totalSal / brutGlobal : 0;
  const nightGross = vars ? r2(vars.nightGross) : 0;
  const nightNet   = r2(nightGross * (1 - tauxSal));
  return { baseGross, fixedGross, varGross, brutGlobal, csgBase,
           cotSal, totalSal, cotPat, totalPat,
           nightGross, nightNet,
           netNonSoumis, netBase, netFinal };
}

function aggregateMonth(monthData, holidays, baseSalary) {
  const hourlyRate = baseSalary / HEURES_BASE;
  let grossVars=0, netNonSoumis=0,
      nightMinTotal=0, nightBaskets=0, mealBaskets=0,
      nightGrossTotal=0;

  for (const [ds, day] of Object.entries(monthData||{})) {
    if (day.type==='rest'||!day.start||!day.end) continue;
    const date = new Date(ds);
    const a = analyzeShift(day.start, day.end, date, holidays);
    const g = computeShiftGross(a, hourlyRate);
    const m = computeManualPrimesAmount(day.manualPrimes);
    nightMinTotal    += a.nightMin;
    nightBaskets     += a.hasNightBasket ? 1 : 0;
    mealBaskets      += a.mealCount;
    nightGrossTotal  += g.nightGross;
    grossVars        += g.grossTotal + m.gross;
    netNonSoumis     += g.netTotal   + m.net;
  }
  // Net nuit = brut nuit - cotisations salariales proportionnelles
  // Taux moyen cotisations salariales sur brut (hors mutuelle fixe) = totalSal/brutGlobal
  // Approximation : on applique le ratio cotisations/brut global sur le brut nuit
  // Ce calcul est finalisé dans computePayslip ; ici on retourne le brut nuit brut
  return {
    nightHours       : r2(nightMinTotal/60),
    nightBaskets, mealBaskets,
    nightGross       : r2(nightGrossTotal),
    grossVariables   : r2(grossVars),
    netNonSoumis     : r2(netNonSoumis),
  };
}

const QUICK_SHIFTS = [
  { key:'s1', label:'2h-8h',   start:'02:00', end:'08:00', cls:'s1' },
  { key:'s2', label:'8h-16h',  start:'08:00', end:'16:00', cls:'s2' },

  { key:'s4', label:'20h-4h',  start:'20:00', end:'04:00', cls:'s4' },
];

function formatDuration(start, end) {
  let s = timeToMin(start), e = timeToMin(end);
  if (e <= s) e += 1440;
  const h = Math.floor((e-s)/60), m = (e-s)%60;
  return m > 0 ? h+'h'+String(m).padStart(2,'0') : h+'h';
}

function renderPage1() {
  const [year, month] = STATE.currentYM.split('-').map(Number);
  const holidays = getFeries(year);
  const daysInMonth = new Date(year, month, 0).getDate();

  // Calcul index de semaine alternée (lundi = début)
  let weekColor = 0;
  let lastWeek  = -1;

  const container = document.getElementById('page1-content');
  let html = '';

  for (let d = 1; d <= daysInMonth; d++) {
    const date    = new Date(year, month-1, d);
    const dow     = date.getDay(); // 0=dim, 1=lun...
    const dateStr = toISO(date);
    const dayData = getDayData(dateStr);
    const isHoliday = holidays.includes(dateStr);
    const isSunday  = dow === 0;

    // Alternance couleur semaine (change le lundi)
    // Semaine ISO : on alterne à chaque lundi
    const mondayDate = new Date(date);
    mondayDate.setDate(d - ((dow===0?7:dow) - 1));
    const weekKey = toISO(mondayDate);
    if (weekKey !== lastWeek) {
      weekColor = weekColor === 0 ? 1 : 0;
      lastWeek  = weekKey;
    }

    const rowClass = isSunday ? 'sunday' : (weekColor===0 ? 'week-a' : 'week-b');
    const holidayClass = isHoliday ? ' holiday' : '';

    const isManual = dayData.type==='shift' && dayData.start && dayData.end &&
                     !QUICK_SHIFTS.some(s=>s.start===dayData.start&&s.end===dayData.end);
    const manualHTML = isManual
      ? `<div class="manual-shift-display" onclick="openManualShift('${dateStr}')">`
        + `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`
        + `<span>${dayData.start} &ndash; ${dayData.end}</span>`
        + `<span class="msd-duration">${formatDuration(dayData.start, dayData.end)}</span></div>`
      : '';
    // Gains du jour
    const gains = computeDayGains(dayData, date, holidays);
    const gainChips = renderGainChips(gains, dayData);

    // Primes manuelles résumé
    const hasPrimes = (dayData.manualPrimes||[]).length > 0;

    html += `
<div class="day-row ${rowClass}${holidayClass}" id="row-${dateStr}">
  <div class="day-top">
    <div class="day-label">
      <span class="day-num">${d}</span>
      <span class="day-name">${isHoliday ? 'FERIE' : DAY_NAMES[dow]}</span>
    </div>
    <div class="quick-btns">
      ${QUICK_SHIFTS.map(s => `
        <button class="qbtn ${s.cls}${dayData.type==='shift'&&dayData.start===s.start&&dayData.end===s.end?' active':''}"
          onclick="selectShift('${dateStr}','${s.start}','${s.end}')">
          ${s.label}
        </button>`).join('')}
      <button class="qbtn sm${dayData.type==='shift'&&!QUICK_SHIFTS.some(s=>s.start===dayData.start&&s.end===dayData.end)?' active':''}"
        onclick="openManualShift('${dateStr}')">Manuel</button>
      <button class="qbtn sr${dayData.type==='rest'?' active':''}"
        onclick="selectRest('${dateStr}')">Repos</button>
    </div>
  </div>
  ${manualHTML}
  <div class="prime-btn-row">
    <button class="prime-add-btn${hasPrimes?' has-primes':''}"
      onclick="openPrimesModal('${dateStr}')">
      ${hasPrimes
        ? `+ ${(dayData.manualPrimes||[]).length} prime(s) selectionnee(s)`
        : '+ Ajouter une prime'}
    </button>
  </div>
  ${gainChips ? `<div class="day-gains">${gainChips}</div>` : ''}
</div>`;
  }

  // Total bas de page
  const ym    = STATE.currentYM;
  const vars  = aggregateMonth(STATE.days[ym], holidays, STATE.config.baseSalary);
  html += renderPage1Total(vars);

  container.innerHTML = html;
}

function computeDayGains(dayData, date, holidays) {
  if (dayData.type !== 'shift' || !dayData.start || !dayData.end) return null;
  const hourlyRate = STATE.config.baseSalary / HEURES_BASE;
  const a = analyzeShift(dayData.start, dayData.end, date, holidays);
  const g = computeShiftGross(a, hourlyRate);
  const m = computeManualPrimesAmount(dayData.manualPrimes);
  return { ...g, manualGross: m.gross, manualNet: m.net, analysis: a };
}

function renderGainChips(gains, dayData) {
  if (!gains) return '';
  let chips = '';
  const a = gains.analysis;
  if (a.nightMin > 0)        chips += `<span class="gain-chip">${(a.nightMin/60).toFixed(1)}h nuit (+${fmt(gains.nightGross)} brut)</span>`;
  if (a.isSunday)            chips += `<span class="gain-chip">Dim. (+${fmt(gains.sundayGross)} brut)</span>`;
  if (a.isHoliday)           chips += `<span class="gain-chip">Ferie (+${fmt(gains.holidayGross)} brut)</span>`;
  if (a.hasNightBasket)      chips += `<span class="gain-chip net">Panier nuit ${fmt(PRIMES_REF.PANIER_NUIT)}</span>`;
  if (a.mealCount > 0)       chips += `<span class="gain-chip net">${a.mealCount} panier(s) repas ${fmt(a.mealCount * PRIMES_REF.PANIER_REPAS)}</span>`;
  if (gains.manualGross > 0) chips += `<span class="gain-chip">Primes brut +${fmt(gains.manualGross)}</span>`;
  if (gains.manualNet > 0)   chips += `<span class="gain-chip net">Primes net +${fmt(gains.manualNet)}</span>`;
  return chips;
}

  <div class="total-row">

</div>`;
}

function selectShift(dateStr, start, end) {
  const day = getDayData(dateStr);
  day.type  = 'shift';
  day.start = start;
  day.end   = end;
  saveState();
  renderPage1();
}

function selectRest(dateStr) {
  const day = getDayData(dateStr);
  day.type  = 'rest';
  day.start = null;
  day.end   = null;
  saveState();
  renderPage1();
}

// ── Modal saisie manuelle ────────────────────────────────────────
function openManualShift(dateStr) {
  STATE._modalDate = dateStr;
  const day = getDayData(dateStr);
  if (day.type==='shift') {
    document.getElementById('manual-start').value = day.start || '08:00';
    document.getElementById('manual-end').value   = day.end   || '16:00';
  }
  document.getElementById('manual-modal-title').textContent =
    'Saisie manuelle — ' + dateStr.slice(8) + '/' + dateStr.slice(5,7);
  openModal('modal-manual');
}

function confirmManualShift() {
  const start = document.getElementById('manual-start').value;
  const end   = document.getElementById('manual-end').value;
  if (!start || !end) return;
  const day   = getDayData(STATE._modalDate);
  day.type  = 'shift';
  day.start = start;
  day.end   = end;
  saveState();
  closeModal('modal-manual');
  renderPage1();
}

// ── Modal primes ─────────────────────────────────────────────────
function openPrimesModal(dateStr) {
  STATE._modalDate = dateStr;
  const day   = getDayData(dateStr);
  const sel   = (day.manualPrimes||[]).reduce((acc,p)=>{ acc[p.id]=p.qty; return acc; }, {});

  const html = PRIME_CATALOG.map(p => `
<div class="prime-item${sel[p.id]?' selected':''}" id="pi-${p.id}" onclick="togglePrime('${p.id}')">
  <div class="pi-check"></div>
  <div class="pi-info">
    <div class="pi-name">${p.name}</div>
    <div class="pi-desc">${p.desc}</div>
    ${p.hasQty ? `
    <div class="prime-qty-row" onclick="event.stopPropagation()">
      <label>${p.qtyLabel} :</label>
      <input type="number" id="qty-${p.id}" value="${sel[p.id]||1}" min="1" max="99"
        style="width:56px;height:28px;border:1px solid var(--border);border-radius:6px;
               text-align:center;font-family:var(--font-mono);font-size:14px;font-weight:600;">
    </div>` : ''}
  </div>
  <div class="pi-amount">${p.amount} ${p.isNet?'net':'brut'}</div>
</div>`).join('');

  document.getElementById('prime-list-content').innerHTML = html;

  // Restaurer sélection
  for (const id of Object.keys(sel)) {
    const el = document.getElementById(`pi-${id}`);
    if (el) el.classList.add('selected');
  }
  openModal('modal-primes');
}

function togglePrime(id) {
  const el = document.getElementById(`pi-${id}`);
  el.classList.toggle('selected');
}

function confirmPrimes() {
  const day = getDayData(STATE._modalDate);
  day.manualPrimes = [];
  for (const p of PRIME_CATALOG) {
    const el = document.getElementById(`pi-${p.id}`);
    if (el && el.classList.contains('selected')) {
      const qtyEl = document.getElementById(`qty-${p.id}`);
      const qty   = qtyEl ? Math.max(1, parseInt(qtyEl.value)||1) : 1;
      day.manualPrimes.push({ id: p.id, qty });
    }
  }
  saveState();
  closeModal('modal-primes');
  renderPage1();
}

// ── Edition salaire / primes fixes ───────────────────────────────
function openEditSalary(target) {
  STATE._editTarget = target;
  const isBase = target === 'base';
  document.getElementById('edit-salary-title').textContent =
    isBase ? 'Salaire de base brut' : 'Modifier prime fixe';
  document.getElementById('edit-salary-input').value =
    isBase ? STATE.config.baseSalary : '';
  openModal('modal-edit-salary');
}

function confirmEditSalary() {
  const val = parseFloat(document.getElementById('edit-salary-input').value);
  if (isNaN(val) || val <= 0) return;
  if (STATE._editTarget === 'base') {
    STATE.config.baseSalary = r2(val);
  }
  saveState();
  closeModal('modal-edit-salary');
  renderPage2();
}

function openModal_addFixed() { openModal('modal-add-fixed'); }

function confirmAddFixedPrime() {
  const label  = document.getElementById('fixed-prime-label').value.trim();
  const amount = parseFloat(document.getElementById('fixed-prime-amount').value);
  if (!label || isNaN(amount) || amount <= 0) return;
  STATE.config.fixedPrimes.push({
    id: 'fp_' + Date.now(),
    label, amount: r2(amount)
  });
  document.getElementById('fixed-prime-label').value  = '';
  document.getElementById('fixed-prime-amount').value = '';
  saveState();
  closeModal('modal-add-fixed');
  renderPage2();
}

function deleteFixedPrime(id) {
  STATE.config.fixedPrimes = STATE.config.fixedPrimes.filter(p => p.id !== id);
  saveState();
  renderPage2();
}

// Persistance dans localStorage

function loadPayslips() {
  try {
    const d = LS.getItem('paie_payslips');
    return d ? JSON.parse(d) : {};
  } catch(e) { return {}; }
}
function savePayslips(ps) {
  try { LS.setItem('paie_payslips', JSON.stringify(ps)); } catch(e) {}
}

let P4_YEAR = new Date().getFullYear();

function renderPage4() {
  const payslips = loadPayslips();
  const holidays = getFeries(P4_YEAR);

  let html = '';

  // ── Sélecteur d'année ─────────────────────────────────────────
  html += `
<div class="p4-year-selector">
  <button class="p4-year-nav" onclick="p4ChangeYear(-1)">&#8249;</button>
  <div class="p4-year-display">${P4_YEAR}</div>
  <button class="p4-year-nav" onclick="p4ChangeYear(1)">&#8250;</button>
</div>`;

  // ── Tableau comparatif 12 mois ────────────────────────────────
  const now = new Date();
  const currentYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  let totalCalc = 0, totalActual = 0, totalDelta = 0;
  let countActual = 0;

  html += `
<div class="section-card" style="margin:8px 8px 0;">
  <div class="section-title">Comparaison annuelle ${P4_YEAR}</div>
  <table class="annual-table">
    <thead>
      <tr>
        <th>Mois</th>
        <th>Calcule</th>
        <th>Percu</th>
        <th>Ecart</th>
      </tr>
    </thead>
    <tbody>`;

  for (let m = 1; m <= 12; m++) {
    const ym = `${P4_YEAR}-${String(m).padStart(2,'0')}`;
    const prevYM = getPrevMonth(ym);
    const [py] = prevYM.split('-').map(Number);
    const prevHolidays = getFeries(py);

    // Calculer le net pour ce mois
    const vars = aggregateMonth(STATE.days[prevYM], prevHolidays, STATE.config.baseSalary);
    const ps   = computePayslip(STATE.config.baseSalary, STATE.config.fixedPrimes, vars);
    const calcNet = ps.netFinal;

    const stored  = payslips[ym] || {};
    const actual  = stored.actualNet || null;
    const delta   = actual !== null ? r2(actual - calcNet) : null;

    totalCalc += calcNet;
    if (actual !== null) { totalActual += actual; totalDelta += delta; countActual++; }

    const isCurrent = ym === currentYM;
    const deltaClass = delta === null ? '' : (delta > 0.5 ? 'delta-pos' : delta < -0.5 ? 'delta-neg' : 'delta-zero');
    const deltaStr   = delta === null ? '-' : `<span class="${deltaClass}">${delta >= 0 ? '+' : ''}${fmt(delta)}</span>`;

    html += `
<tr${isCurrent ? ' class="current-month"' : ''}>
  <td>${MONTH_NAMES[m-1].slice(0,4)}.</td>
  <td>${fmt(calcNet)}</td>
  <td>
    <div class="percu-input-row">
      <input type="number" id="percu-${ym}" value="${actual !== null ? actual.toFixed(2) : ''}"
        placeholder="0,00" step="0.01" min="0"
        onchange="saveActualNet('${ym}', this.value)"
        style="width:88px;">
    </div>
  </td>
  <td>${deltaStr}</td>
</tr>`;
  }

  html += `
    </tbody>
  </table>
  <div class="annual-totals">
    <div class="annual-total-cell">
      <div class="atc-label">Total calcule</div>
      <div class="atc-val">${fmt(r2(totalCalc))}</div>
    </div>
    <div class="annual-total-cell">
      <div class="atc-label">Total percu</div>
      <div class="atc-val">${countActual > 0 ? fmt(r2(totalActual)) : '-'}</div>
    </div>
    <div class="annual-total-cell ${totalDelta < -0.5 ? 'negative' : totalDelta > 0.5 ? 'positive' : ''}">
      <div class="atc-label">Ecart total</div>
      <div class="atc-val">${countActual > 0 ? (totalDelta >= 0 ? '+' : '') + fmt(r2(totalDelta)) : '-'}</div>
    </div>
  </div>
</div>`;

  // ── Bouton export ─────────────────────────────────────────────
  html += `
<div style="padding:4px 0 8px;">
  <div style="padding:8px 12px 4px;font-size:11px;color:var(--text3);">
    Exporter le detail d'un mois specifique :
  </div>
  <div style="display:flex;gap:8px;padding:0 12px;align-items:center;flex-wrap:wrap;">
    <select id="export-month-select"
      style="flex:1;height:40px;border:1px solid var(--border);border-radius:8px;
             padding:0 10px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg2);">
      ${Array.from({length:12},(_,i)=>{
        const ym = `${P4_YEAR}-${String(i+1).padStart(2,'0')}`;
        return `<option value="${ym}">${MONTH_NAMES[i]} ${P4_YEAR}</option>`;
      }).join('')}
    </select>
    <button class="export-btn" style="width:auto;padding:0 18px;margin:0;" onclick="exportDoc()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exporter .doc
    </button>
  </div>
</div>`;

  document.getElementById('page4-content').innerHTML = html;
}

function p4ChangeYear(delta) {
  P4_YEAR += delta;
  renderPage4();
}

function saveActualNet(ym, value) {
  const payslips = loadPayslips();
  const val = parseFloat(value);
  if (isNaN(val) || val < 0) return;
  if (!payslips[ym]) payslips[ym] = {};
  payslips[ym].actualNet = r2(val);
  savePayslips(payslips);
  // Mettre a jour uniquement la cellule delta sans re-render complet
  updateDeltaCell(ym, payslips[ym].actualNet);
}

function updateDeltaCell(ym, actual) {
  const prevYM = getPrevMonth(ym);
  const [py] = prevYM.split('-').map(Number);
  const vars = aggregateMonth(STATE.days[prevYM], getFeries(py), STATE.config.baseSalary);
  const ps   = computePayslip(STATE.config.baseSalary, STATE.config.fixedPrimes, vars);
  const delta = r2(actual - ps.netFinal);
  const deltaClass = delta > 0.5 ? 'delta-pos' : delta < -0.5 ? 'delta-neg' : 'delta-zero';
  // Trouver la td delta de cette ligne
  const input = document.getElementById(`percu-${ym}`);
  if (input) {
    const row = input.closest('tr');
    if (row) {
      const cells = row.querySelectorAll('td');
      if (cells[3]) {
        cells[3].innerHTML = `<span class="${deltaClass}">${delta >= 0 ? '+' : ''}${fmt(delta)}</span>`;
      }
    }
  }
}

// ================================================================
// EXPORT .DOC (format RTF lisible par Word)
// ================================================================

function exportDoc() {
  const select = document.getElementById('export-month-select');
  const ym = select ? select.value : STATE.currentYM;
  const [year, month] = ym.split('-').map(Number);
  const prevYM = getPrevMonth(ym);
  const [py, pm] = prevYM.split('-').map(Number);

  const holidays     = getFeries(year);
  const prevHolidays = getFeries(py);
  const hourlyRate   = STATE.config.baseSalary / HEURES_BASE;

  // Donnees du mois precedent (variables reportees)
  const vars = aggregateMonth(STATE.days[prevYM], prevHolidays, STATE.config.baseSalary);
  const ps   = computePayslip(STATE.config.baseSalary, STATE.config.fixedPrimes, vars);

  // Donnees du mois courant (variables en reserve pour M+1)
  const currentVars = aggregateMonth(STATE.days[ym], holidays, STATE.config.baseSalary);

  // Payslips stockes
  const stored  = loadPayslips();
  const actualNet = stored[ym] ? stored[ym].actualNet : null;

  // ── Construction du contenu RTF ──────────────────────────────
  const lines = [];
  const L  = s => lines.push(s);
  const HR = () => L('--------------------------------');
  const TITLE = s => { L(''); L(s.toUpperCase()); HR(); };

  L(`BULLETIN DE PAIE PREVISIONNEL - ${MONTH_NAMES[month-1].toUpperCase()} ${year}`);
  L(`Genere le ${new Date().toLocaleDateString('fr-FR')}`);
  L('');

  // ── SECTION 1 : Synthese horaire ─────────────────────────────
  TITLE('1. Synthese des volumes horaires et comptabilite');
  L(`Base contractuelle         : ${HEURES_BASE} h`);
  L(`Salaire de base brut       : ${fmt(ps.baseGross)}`);
  L(`Brut global (apres vars)   : ${fmt(ps.brutGlobal)}`);
  L(`Total cotisations salariales: -${fmt(ps.totalSal)}`);
  L(`Salaire net avant elements : ${fmt(ps.netBase)}`);
  L('');

  // ── SECTION 2 : Primes de M-1 ────────────────────────────────
  TITLE(`2. Detail des primes de M-1 (${MONTH_NAMES[pm-1]} ${py}) payees ce mois`);
  L(`Heures de nuit             : ${vars.nightHours.toFixed(2)} h`);
  L(`Majoration nuit brut       : ${fmt(ps.nightGross)}`);
  L(`Majoration nuit net        : ${fmt(ps.nightNet)}`);
  L(`Paniers de nuit            : ${vars.nightBaskets} x ${fmt(PRIMES_REF.PANIER_NUIT)} = ${fmt(vars.nightBaskets * PRIMES_REF.PANIER_NUIT)}`);
  L(`Paniers repas              : ${vars.mealBaskets} x ${fmt(PRIMES_REF.PANIER_REPAS)} = ${fmt(vars.mealBaskets * PRIMES_REF.PANIER_REPAS)}`);
  L(`Total primes brut soumises : ${fmt(vars.grossVariables)}`);
  L(`Total primes nettes        : ${fmt(vars.netNonSoumis)}`);

  // Primes fixes
  if ((STATE.config.fixedPrimes||[]).length > 0) {
    L('');
    L('Primes fixes mensuelles :');
    for (const fp of STATE.config.fixedPrimes) {
      L(`  ${fp.label.padEnd(26)} : ${fmt(fp.amount)}`);
    }
  }
  L('');

  // ── SECTION 3 : Variables du mois en cours ───────────────────
  const nextYM2 = getNextMonth(ym);
  const [ny2, nm2] = nextYM2.split('-').map(Number);
  TITLE(`3. Compteur des primes du mois en cours (reportees sur ${MONTH_NAMES[nm2-1]} ${ny2})`);
  L(`Heures de nuit             : ${currentVars.nightHours.toFixed(2)} h`);
  L(`Paniers de nuit            : ${currentVars.nightBaskets}`);
  L(`Paniers repas              : ${currentVars.mealBaskets}`);
  L(`Total brut variables       : ${fmt(currentVars.grossVariables)}`);
  L(`Total net non soumis       : ${fmt(currentVars.netNonSoumis)}`);
  L('');

  // ── SECTION 4 : Feuille de temps ─────────────────────────────
  TITLE('4. Feuille de temps et shifts detailles jour par jour');
  L(`${'Date'.padEnd(12)}${'Shift'.padEnd(14)}${'H.Nuit'.padEnd(8)}${'Panier N'.padEnd(10)}${'Panier R'.padEnd(10)}Primes`);
  HR();

  const daysInMonth = new Date(year, month, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const date    = new Date(year, month-1, d);
    const dateStr = toISO(date);
    const dayData = (STATE.days[ym] || {})[dateStr];
    const dow     = date.getDay();
    const isFerie = holidays.includes(dateStr);
    const dayLabel = `${d} ${DAY_NAMES[dow]}${isFerie?' F':''}`.padEnd(11);

    if (!dayData || dayData.type === 'rest') {
      L(`${dayLabel} Repos`);
      continue;
    }

    const a = analyzeShift(dayData.start, dayData.end, date, holidays);
    const g = computeShiftGross(a, hourlyRate);
    const shiftLabel = `${dayData.start}-${dayData.end}`.padEnd(13);
    const nightH = `${(a.nightMin/60).toFixed(1)}h`.padEnd(7);
    const panN   = a.hasNightBasket ? 'Oui'.padEnd(9) : 'Non'.padEnd(9);
    const panR   = `${a.mealCount}x`.padEnd(9);

    // Primes du jour
    const primesList = [];
    if (g.nightGross > 0)   primesList.push(`Nuit brut +${fmt(g.nightGross)}`);
    if (g.sundayGross > 0)  primesList.push(`Dim +${fmt(g.sundayGross)}`);
    if (g.holidayGross > 0) primesList.push(`Ferie +${fmt(g.holidayGross)}`);
    for (const p of (dayData.manualPrimes||[])) {
      const cat = PRIME_CATALOG.find(c=>c.id===p.id);
      if (cat) primesList.push(`${cat.name.split(' ')[1]||cat.name} x${p.qty}`);
    }
    L(`${dayLabel} ${shiftLabel} ${nightH} ${panN} ${panR} ${primesList.join(', ')}`);
  }
  L('');

  // ── SECTION 5 : Resultat ─────────────────────────────────────
  TITLE('5. Resultat');
  L(`Salaire net calcule        : ${fmt(ps.netFinal)}`);
  if (actualNet !== null) {
    const delta = r2(actualNet - ps.netFinal);
    L(`Salaire net percu          : ${fmt(actualNet)}`);
    L(`Ecart                      : ${delta >= 0 ? '+' : ''}${fmt(delta)}`);
    if (Math.abs(delta) > 0.5) {
      L(`>>> ANOMALIE DETECTEE : ecart de ${fmt(Math.abs(delta))} <<<`);
    } else {
      L('>>> Bulletin conforme <<<');
    }
  } else {
    L('Salaire net percu          : (non saisi)');
  }

  // ── Generation du fichier ────────────────────────────────────
  const text = lines.join('\n');

  // Format RTF minimal (lisible par Word et LibreOffice)
  const rtf = [
    '{\\rtf1\\ansi\\deff0',
    '{\\fonttbl{\\f0\\fmodern\\fcharset0 Courier New;}{\\f1\\fswiss\\fcharset0 Arial;}}',
    '{\\colortbl;\\red0\\green0\\blue0;\\red26\\green86\\blue219;\\red22\\green163\\blue74;\\red220\\green38\\blue38;}',
    '\\f0\\fs20\\widowctrl\\hyphauto',
    text
      .replace(/\\/g, '\\\\')
      .replace(/[{}]/g, m => '\\' + m)
      .replace(/\n/g, '\\par\n')
      .replace(/[\u0080-\uFFFF]/g, c => `\\'${c.charCodeAt(0).toString(16).padStart(2,'0')}`),
    '}'
  ].join('\n');

  const blob = new Blob([rtf], { type: 'application/rtf' });
  const url  = URL.createObjectURL(blob);
  const a2   = document.createElement('a');
  a2.href    = url;
  a2.download = `bulletin_${ym}.doc`;
  a2.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}


// ================================================================
// INITIALISATION
// ================================================================
function init() {
  loadState();
  const now = new Date();
  STATE.currentYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [y,m] = STATE.currentYM.split('-').map(Number);
  const label = `${MONTH_NAMES[m-1]} ${y}`;
  document.getElementById('p1-date-label').textContent = label;
  document.getElementById('p2-date-label').textContent = label;
  renderPage1();
}

init();

      .catch(err => console.warn('[PWA] Echec enregistrement SW:', err));
